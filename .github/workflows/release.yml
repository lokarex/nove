name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    environment: crates-io-publish
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Publishing version $TAG_VERSION"

      - name: Publish nove_cpu
        run: cargo publish -p nove_cpu --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_candle
        run: cargo publish -p nove_candle --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_macro
        run: cargo publish -p nove_macro --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_dataset
        run: cargo publish -p nove_dataset --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_native
        run: cargo publish -p nove_native --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_backend
        run: cargo publish -p nove_backend --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_tensor
        run: cargo publish -p nove_tensor --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_lossfn
        run: cargo publish -p nove_lossfn --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_optimizer
        run: cargo publish -p nove_optimizer --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_metric
        run: cargo publish -p nove_metric --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_model
        run: cargo publish -p nove_model --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_dataloader
        run: cargo publish -p nove_dataloader --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove_learner
        run: cargo publish -p nove_learner --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish nove
        run: cargo publish -p nove --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
